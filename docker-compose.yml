services:
  db:
    image: postgres:18-alpine
    container_name: urbandash-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urbandash
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - urbandash_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urbandash"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: urbandash-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/urbandash
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "4040:4040"

  frontend:
    build:
      context: ./frontend
    container_name: urbandash-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8007:8007"

volumes:
  urbandash_pgdata:
